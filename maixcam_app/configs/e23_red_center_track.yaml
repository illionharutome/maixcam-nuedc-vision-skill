{
  "camera": {
    "width": 320,
    "height": 240,
    "exposure_mode": "manual",
    "exposure_us": 8000,
    "gain": 1024,
    "awb_mode": "auto",
    "settle_frames": 30
  },
  "reference_mode": "image_center",
  "lock_deadband_px": 8,
  "frame_roi": {
    "required": true,
    "inset_px": 12,
    "hold_frames": 3,
    "detector": {
      "dark_threshold": 0,
      "blur_size": 5,
      "morphology_kernel": 3,
      "min_area_ratio": 0.03,
      "max_area_ratio": 0.85,
      "min_aspect_ratio": 1.1,
      "max_aspect_ratio": 1.8,
      "aspect_ratio_target": 1.414,
      "min_rectangularity": 0.65,
      "epsilon_ratio": 0.02,
      "reject_border_touching": true,
      "border_margin_px": 2,
      "path_inset_px": 4,
      "points_per_edge": 50
    }
  },
  "target_detector": {
    "threshold_strategy": "and",
    "thresholds": [
      {"space": "red_excess", "enabled": true, "lower": 8, "upper": 255},
      {"space": "brightness", "enabled": true, "lower": 40, "upper": 255}
    ],
    "roi": [0, 0, 320, 240],
    "filters": {"min_area": 1, "max_area": 600, "min_circularity": 0.1},
    "morphology": {"kernel": 1},
    "tracking": {"max_jump_px": 90, "hold_frames": 4}
  }
}
